

<h1>Matieres premieres </h1>

<a routerLink="add">Ajouter</a>

<table>
    @for(mp of mp$ | async; track mp.id){
    <tr>
        <td>{{ mp.id }}</td>
        <td>{{ mp.nomMP }}</td>
        <td>{{ mp.INCI }}</td>
        <td>{{ mp.NOI }}</td>
        <td>{{ mp.categorie }}</td>
        <td>{{ mp.cosmos }}</td>
        <td>{{ mp.fonction }}</td>
    </tr>
    } @empty {
      <tr>
        <td colspan="4">Aucune matiere premieres trouvé</td>
      </tr>
    }
</table>
<!-- Indicateur de chargement -->
<div *ngIf="isLoading" class="loading-spinner">
  Chargement des matières premières...
</div>

<!-- Message d'erreur -->
<div *ngIf="errorMessage" class="error-message">
  {{ errorMessage }}
</div>

<!-- Liste des matières premières -->
<div *ngIf="!isLoading && !errorMessage">
  <div *ngFor="let mp of mp$ | async">
    <!-- Votre contenu existant -->
  </div>
</div>

<!-- Optionnel : bouton pour recharger -->
<button *ngIf="errorMessage" (click)="reload()">
  Réessayer
</button>
