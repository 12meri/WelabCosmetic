<!-- src/app/login/login.component.html -->
<div class="login-page">
  

  <main class="hero">
    <div class="overlay">
      <section class="login-card">
        <h1>Se connecter</h1>

        @if (!auth.isAuthentified) {
          <form (ngSubmit)="login()">
            <div class="form-group">
              <label for="email">Email</label>
              <input
                id="email"
                name="email"
                type="email"
                [(ngModel)]="email"
                required
              />
            </div>

            <div class="form-group">
              <label for="password">Mot de passe</label>
              <input
                id="password"
                name="password"
                type="password"
                [(ngModel)]="password"
                required
              />
            </div>

            <button type="submit" [disabled]="!isValid">
              Se connecter
            </button>
          </form>

          <div class="links">
              <a routerLink="/forgot-password">Mot de passe oublié ?</a>          </div>
        } @else {
          <p>Déjà connecté en tant que {{ auth.email }}</p>
        }
      </section>
    </div>
  </main>
</div>
