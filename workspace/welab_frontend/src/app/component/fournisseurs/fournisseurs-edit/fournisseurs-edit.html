<div class="fournisseur-edit-container">
  <h2>Modifier un fournisseur</h2>

  @if (successMessage) {
    <div class="alert success">{{ successMessage }}</div>
  }

  @if (errorMessage) {
    <div class="alert error">{{ errorMessage }}</div>
  }

  <form (ngSubmit)="update()" #fournisseurForm="ngForm">

    <div class="form-group">
      <label for="nomEntr">Nom de l'entreprise *</label>
      <input
        type="text"
        id="nomEntr"
        name="nomEntr"
        [(ngModel)]="fournisseur.nomEntr"
        required
        class="form-control">
    </div>

    <div class="form-group">
      <label for="adresse">Adresse</label>
      <input
        type="text"
        id="adresse"
        name="adresse"
        [(ngModel)]="fournisseur.adresse"
        class="form-control">
    </div>

    <div class="form-group">
      <label for="emailGen">Email général</label>
      <input
        type="email"
        id="emailGen"
        name="emailGen"
        [(ngModel)]="fournisseur.emailGen"
        class="form-control">
    </div>

    <div class="form-group">
      <label for="telFourni">Téléphone</label>
      <input
        type="text"
        id="telFourni"
        name="telFourni"
        [(ngModel)]="fournisseur.telFourni"
        class="form-control">
    </div>

    <div class="form-actions">
      <button type="submit" [disabled]="isLoading || fournisseurForm.invalid" class="btn-update">
        {{ isLoading ? 'Modification...' : 'Modifier' }}
      </button>
      <button type="button" (click)="cancel()" class="btn-cancel">
        Annuler
      </button>
    </div>

  </form>
</div>
