<div class="modal-backdrop">
  <div class="modal-box">
    <h3>Ajouter une matière première</h3>

    <div class="form-group">
      <label>Matière première *</label>
      <select [(ngModel)]="selectedMatPrem" class="form-control" required>
        <option [value]="null">-- Choisir --</option>
        @for (m of matieres; track m.id) {
          <option [value]="m.id">{{ m.nomMP }}</option>
        }
      </select>
    </div>

    <div class="form-group">
      <label>Distribution (marque de ce fournisseur) — optionnel</label>
      @if (distributionsFournisseur.length === 0) {
        <p class="hint">Aucune distribution enregistrée pour ce fournisseur.</p>
      } @else {
        <select [(ngModel)]="selectedDistribution" class="form-control">
          <option [value]="null">Toutes marques / Sans distribution</option>
          @for (d of distributionsFournisseur; track d.id) {
            <option [value]="d.id">{{ d.nomMarque }}</option>
          }
        </select>
      }
    </div>

    <!-- <div class="form-group">
      <label>Contact associé — optionnel</label>
      @if (contacts.length === 0) {
        <p class="hint">Aucun contact enregistré pour ce fournisseur.</p>
      } @else {
        <select [(ngModel)]="selectedContactId" class="form-control">
          <option [value]="null">-- Aucun contact --</option>
          @for (c of contacts; track c.id) {
            <option [value]="c.id">
              {{ c.nom }} {{ c.prenom || '' }}
              @if (c.fonction) { — {{ c.fonction }} }
            </option>
          }
        </select>
      }
    </div> -->

    <div class="form-group">
      <label>Prix (€)</label>
      <input type="number" step="0.01" [(ngModel)]="prix" class="form-control">
    </div>

    <div class="form-group">
      <label>MOQ (quantité minimale)</label>
      <input type="number" step="0.01" [(ngModel)]="moq" class="form-control">
    </div>

    <div class="modal-actions">
      <button class="btn-cancel" (click)="cancel()">Annuler</button>
      <button class="btn-save" (click)="save()">Enregistrer</button>
    </div>
  </div>
</div>
