<div class="contact-add-container">
  <h2>Ajouter un contact fournisseur</h2>

  @if (successMessage) {
    <div class="alert success">{{ successMessage }}</div>
  }
  @if (errorMessage) {
    <div class="alert error">{{ errorMessage }}</div>
  }

  <form (ngSubmit)="create()" #contactForm="ngForm">

    <div class="form-group">
      <label for="nom">Nom *</label>
      <input type="text" id="nom" name="nom"
        [(ngModel)]="contact.nom" required class="form-control">
    </div>

    <div class="form-group">
      <label for="prenom">Prénom</label>
      <input type="text" id="prenom" name="prenom"
        [(ngModel)]="contact.prenom" class="form-control">
    </div>

    <div class="form-group">
      <label for="fonction">Fonction</label>
      <input type="text" id="fonction" name="fonction"
        [(ngModel)]="contact.fonction" class="form-control">
    </div>

    <div class="form-group">
      <label for="email">Email</label>
      <input type="email" id="email" name="email"
        [(ngModel)]="contact.email" class="form-control">
    </div>

    <div class="form-group">
      <label for="telContact">Téléphone</label>
      <input type="text" id="telContact" name="telContact"
        [(ngModel)]="contact.telContact" class="form-control">
    </div>

    <div class="form-group">
  <label for="fournisseur">Fournisseur</label>
  @if (isLoadingFournisseurs) {
    <p class="loading">Chargement des fournisseurs...</p>
  } @else {
    <select id="fournisseur" name="fournisseur"
      [(ngModel)]="contact.fournisseur"
      [disabled]="contact.fournisseur !== null && contact.fournisseur !== ''"
      class="form-control">
      <option value="">-- Choisir un fournisseur --</option>
      @for (f of fournisseurs; track f.id) {
        <option [value]="getFournisseurIri(f)">{{ f.nomEntr }}</option>
      }
    </select>
    @if (contact.fournisseur) {
      <small class="text-muted">Fournisseur pré-sélectionné depuis la page détail</small>
    }
  }
</div>

    <div class="form-actions">
      <button type="submit"
        [disabled]="isLoading || isLoadingFournisseurs || !contactForm.valid"
        class="btn-submit">
        {{ isLoading ? 'Création en cours...' : 'Créer' }}
      </button>
      <button type="button" (click)="cancel()" class="btn-cancel">
        Annuler
      </button>
    </div>

  </form>
</div>
