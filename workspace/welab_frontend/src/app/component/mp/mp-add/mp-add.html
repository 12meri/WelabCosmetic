<div class="mp-add-container">
  <h2>Ajouter une matière première</h2>
  
  <!-- Messages -->
  @if (successMessage) {
    <div class="alert success">
      {{ successMessage }}
    </div>
  }
  
  @if (errorMessage) {
    <div class="alert error">
      {{ errorMessage }}
    </div>
  }
  
  <!-- Formulaire -->
  <form (ngSubmit)="createMp()" #mpForm="ngForm">
    <div class="form-group">
      <label for="nomMP">Nom de la matière première *</label>
      <input 
        type="text" 
        id="nomMP" 
        name="nomMP" 
        [(ngModel)]="mp.nomMP" 
        required
        class="form-control">
    </div>
    
    <div class="form-group">
      <label for="INCI">INCI *</label>
      <input 
        type="text" 
        id="INCI" 
        name="INCI" 
        [(ngModel)]="mp.INCI" 
        required
        class="form-control">
    </div>
    
    <div class="form-group">
      <label for="NOI">NOI (Natural Origin Index)</label>
      <input 
        type="text" 
        id="NOI" 
        name="NOI" 
        [(ngModel)]="mp.NOI" 
        class="form-control">
      <small class="text-muted">Format : deux décimales (ex: 0.50, 0.99, 1.00)</small>
    </div>
    
    <!-- <div class="form-group">
      <label>Catégorie </label>
      <p class="form-control-static">{{ getCategorieFromNom() }}</p>
    </div> -->
    
    <div class="form-group">
      <label for="cosmos">COSMOS *</label>
      <select 
        id="cosmos" 
        name="cosmos" 
        [(ngModel)]="mp.cosmos" 
        required
        class="form-control">
        <option value="">Sélectionner</option>
        <option value="OUI">OUI</option>
        <option value="NON">NON</option>
      </select>
    </div>
    
    <div class="form-group">
      <label for="fonction">Fonction *</label>
      <textarea 
        id="fonction" 
        name="fonction" 
        [(ngModel)]="mp.fonction" 
        required
        rows="3"
        class="form-control"></textarea>
    </div>
    
    <div class="form-actions">
      <button type="submit" [disabled]="isLoading || !mpForm.valid" class="btn-submit">
        {{ isLoading ? 'Création en cours...' : 'Créer' }}
      </button>
      <button type="button" (click)="cancel()" class="btn-cancel">
        Annuler
      </button>
    </div>
  </form>
</div>
