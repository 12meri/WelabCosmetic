<div class="mp-edit-container">
  <h2>Modifier une matière première</h2>

  <!-- message succès -->
  @if (successMessage) {
    <div class="alert success">
      {{ successMessage }}
    </div>
  }

  <!-- message erreur -->
  @if (errorMessage) {
    <div class="alert error">
      {{ errorMessage }}
    </div>
  }

  <!-- formulaire -->
  <form (ngSubmit)="updateMp()" #mpForm="ngForm">

    <!-- nom -->
    <div class="form-group">
      <label for="nomMP">Nom MP</label>
      <input
        type="text"
        id="nomMP"
        name="nomMP"
        [(ngModel)]="mp.nomMP"
        class="form-control"
        required
      />
    </div>

    <!-- INCI -->
    <div class="form-group">
      <label for="INCI">INCI</label>
      <input
        type="text"
        id="INCI"
        name="INCI"
        [(ngModel)]="mp.INCI"
        class="form-control"
      />
    </div>

    <!-- NOI -->
    <div class="form-group">
      <label for="NOI">NOI (Natural Origin Index)</label>
      <input 
        type="text" 
        id="NOI" 
        name="NOI" 
        [(ngModel)]="mp.NOI" 
        class="form-control">
      <small class="text-muted">Format : deux décimales (ex: 0.50, 0.99, 1.00)</small>
    </div>

    <!-- fonction -->
    <div class="form-group">
      <label for="fonction">Fonction</label>
      <input
        type="text"
        id="fonction"
        name="fonction"
        [(ngModel)]="mp.fonction"
        class="form-control"
      />
    </div>

    <div class="form-group">
      <label for="cosmos">COSMOS *</label>
      <select 
        id="cosmos" 
        name="cosmos" 
        [(ngModel)]="mp.cosmos" 
        required
        class="form-control">
        <option value="">Sélectionner</option>
        <option value="OUI">OUI</option>
        <option value="NON">NON</option>
      </select>
    </div>

    <!-- boutons -->
    <div class="form-actions">
      <button
        type="submit"
        class="btn-update"
        [disabled]="isLoading || mpForm.invalid">
        {{ isLoading ? 'Modification...' : 'Modifier' }}
      </button>

      <button
        type="button"
        class="btn-cancel"
        (click)="cancel()">
        Annuler
      </button>
    </div>

  </form>
</div>
