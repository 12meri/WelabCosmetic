<div class="email-edit-container">
  <h2>Modifier un email</h2>

  @if (successMessage) {
    <div class="alert success">{{ successMessage }}</div>
  }

  @if (errorMessage) {
    <div class="alert error">{{ errorMessage }}</div>
  }

  <!--
    (ngSubmit) appelle update() qui déclenche un PATCH côté service.
    [(ngModel)] sur chaque champ assure la liaison bidirectionnelle :
    quand on charge l'email via le service, les champs se remplissent
    automatiquement.
  -->
  <form (ngSubmit)="update()" #emailForm="ngForm">

    <div class="form-group">
      <label for="sujet">Sujet *</label>
      <input
        type="text"
        id="sujet"
        name="sujet"
        maxlength="200"
        [(ngModel)]="email.sujet"
        required
        class="form-control">
    </div>

    <div class="form-group">
      <label for="txt">Message</label>
      <textarea
        id="txt"
        name="txt"
        rows="6"
        [(ngModel)]="email.txt"
        class="form-control"></textarea>
    </div>

    <div class="form-group">
      <label for="demandeEchantillon">Demande d'échantillon *</label>
      <select
        id="demandeEchantillon"
        name="demandeEchantillon"
        [(ngModel)]="email.demandeEchantillon"
        required
        class="form-control">
        <option value="" disabled>-- Choisir une demande --</option>
        @for (d of demandes; track d.id) {
          <option [value]="d['@id']">{{ demandeLabel(d) }}</option>
        }
      </select>
    </div>

    <div class="form-actions">
      <button type="submit" [disabled]="isLoading || emailForm.invalid" class="btn-update">
        {{ isLoading ? 'Modification...' : 'Modifier' }}
      </button>
      <button type="button" (click)="cancel()" class="btn-cancel">
        Annuler
      </button>
    </div>

  </form>
</div>
