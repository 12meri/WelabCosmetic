<div class="lot-add-container">
  <h2>Ajouter un lot</h2>

  <form (ngSubmit)="createLot()" #lotForm="ngForm">

    <div class="form-group">
      <label for="numLot">Numéro du lot</label>
      <input
        id="numLot"
        class="form-control"
        type="text"
        name="numLot"
        [(ngModel)]="lot.numLot"
        required
      />
    </div>

    <div class="form-group">
      <label for="dateArrivee">Date d'arrivée</label>
      <input
        id="dateArrivee"
        class="form-control"
        type="date"
        name="dateArrivee"
        [(ngModel)]="lot.dateArrivee"
      />
    </div>

    <div class="form-group">
      <label for="ddm">Date DDM</label>
      <input
        id="ddm"
        class="form-control"
        type="date"
        name="ddm"
        [(ngModel)]="lot.ddm"
      />
    </div>

    <!-- ✅ IMPORTANT : TEXT et pas NUMBER -->
    <div class="form-group">
      <label for="qtInitiale">Quantité initiale</label>
      <input
        id="qtInitiale"
        class="form-control"
        type="text"
        inputmode="numeric"
        name="qtInitiale"
        [(ngModel)]="lot.qtInitiale"
        required
      />
    </div>

    <!-- <div class="form-group">
      <label for="qtRestante">Quantité restante</label>
      <input
        id="qtRestante"
        class="form-control"
        type="text"
        inputmode="numeric"
        name="qtRestante"
        [(ngModel)]="lot.qtRestante"
      />
    </div> -->

    <!-- <div class="form-group">
      <label for="dateMaj">Date de mise à jour</label>
      <input
        id="dateMaj"
        class="form-control"
        type="datetime-local"
        name="dateMaj"
        [(ngModel)]="lot.dateMaj"
      />
    </div> -->

    <div class="form-group">
      <label for="qtMin">Quantité minimale</label>
      <input
        id="qtMin"
        class="form-control"
        type="text"
        inputmode="numeric"
        name="qtMin"
        [(ngModel)]="lot.qtMin"
      />
    </div>

    <!-- <div class="form-group">
      <label for="etat">État</label>
      <select
        id="etat"
        class="form-control"
        name="etat"
        [(ngModel)]="lot.etat"
      >
        <option value="OK">OK</option>
        <option value="ALERTE">ALERTE</option>
        <option value="EPUISE">EPUISE</option>
      </select>
    </div> -->

    <!-- ✅ LISTE DÉROULANTE -->
    <div class="form-group">
      <label for="mp">Matière première</label>
      <select
        id="mp"
        class="form-control"
        name="mp"
        [(ngModel)]="lot.mp"
        required
      >
        <option value="">-- Choisir une matière première --</option>
        <option *ngFor="let mp of matieresPremieres" [value]="getMpIri(mp)">
          {{ mp.nomMP }}
        </option>
      </select>
    </div>

    <!-- 🔄 chargement -->
    <div *ngIf="isLoadingMp" class="alert">
      Chargement des matières premières...
    </div>

    <!-- ✅ succès -->
    <div *ngIf="successMessage" class="alert success">
      {{ successMessage }}
    </div>

    <!-- ❌ erreur -->
    <div *ngIf="errorMessage" class="alert error">
      {{ errorMessage }}
    </div>

    <div class="form-actions">
      <button type="submit" class="btn-submit" [disabled]="isLoading || isLoadingMp">
        {{ isLoading ? 'Ajout...' : 'Ajouter' }}
      </button>

      <button type="button" class="btn-cancel" (click)="cancel()">
        Annuler
      </button>
    </div>

  </form>
</div>
