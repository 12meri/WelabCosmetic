<div class="distribution-add-container">
  <h2>Ajouter une distribution</h2>

  @if (successMessage) {
    <div class="alert success">{{ successMessage }}</div>
  }

  @if (errorMessage) {
    <div class="alert error">{{ errorMessage }}</div>
  }

  <form (ngSubmit)="create()" #distributionForm="ngForm">

    <div class="form-group">
      <label for="nomMarque">Nom de marque *</label>
      <input
        type="text"
        id="nomMarque"
        name="nomMarque"
        [(ngModel)]="distribution.nomMarque"
        required
        class="form-control">
    </div>

    <div class="form-group">
      <label for="fournisseur">Fournisseur *</label>
      @if (isLoadingFournisseurs) {
        <p class="loading">Chargement des fournisseurs...</p>
      } @else {
        <select
          id="fournisseur"
          name="fournisseur"
          [(ngModel)]="distribution.fournisseur"
          required
          class="form-control">
          <option value="">-- Choisir un fournisseur --</option>
          @for (f of fournisseurs; track f.id) {
            <option [value]="getFournisseurIri(f)">{{ f.nomEntr }}</option>
          }
        </select>
      }
    </div>

    <div class="form-actions">
      <button type="submit" [disabled]="isLoading || isLoadingFournisseurs || !distributionForm.valid" class="btn-submit">
        {{ isLoading ? 'Création en cours...' : 'Créer' }}
      </button>
      <button type="button" (click)="cancel()" class="btn-cancel">
        Annuler
      </button>
    </div>

  </form>
</div>
