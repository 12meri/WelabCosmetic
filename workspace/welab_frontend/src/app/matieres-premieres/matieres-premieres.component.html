<h1>Matieres premieres </h1>

<a routerLink="add">Ajouter</a>

<table>
  @for(mp of mp$ | async; track mp.id){
  <tr>
    <td>{{ mp.id }}</td>
    <td>{{ mp.nomMP }}</td>
    <td>{{ mp.INCI }}</td>
    <td>{{ mp.NOI }}</td>
    <td>{{ mp.categorie }}</td>
    <td>{{ mp.cosmos }}</td>
    <td>{{ mp.fonction }}</td>

    <!-- ✅ ICI TU AJOUTES LE BOUTON -->
    <td>
      <a [routerLink]="['/matpremieres/edit', mp.id]" class="btn-update">
        Modifier
      </a>
    </td>

  </tr>
  } @empty {
    <tr>
      <td colspan="8">Aucune matiere premieres trouvé</td>
    </tr>
  }
</table>
