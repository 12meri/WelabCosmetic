<div class="login-page">
  <header class="topbar">
    <div class="brand">WelabCosmetic</div>
  </header>

  <main class="hero">
    <div class="overlay">
      <section class="login-card">
        <h1>Se connecter</h1>

        <a routerLink="/matpremieres">Go to matières premières</a>

        <form (ngSubmit)="login()">
          <div class="form-group">
            <label for="username">Nom utilisateur</label>
            <input
              id="username"
              name="username"
              type="text"
              [(ngModel)]="username"
            />
          </div>

          <div class="form-group">
            <label for="password">Mot de passe</label>
            <input
              id="password"
              name="password"
              type="password"
              [(ngModel)]="password"
            />
          </div>

          <button type="submit" [disabled]="!isValid">
            Se connecter
          </button>
        </form>

        <div class="links">
          <a href="#">Mot de passe oublié ?</a>
          <a href="#">Pas de compte ? Créer un compte</a>
        </div>
      </section>
    </div>
  </main>
</div>
